version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: judge-postgres
    environment:
      POSTGRES_DB: online_judge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - judge-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: judge-redis
    ports:
      - "6379:6379"
    networks:
      - judge-network

  # Spring Boot Backend
  backend:
    build: ./backend
    container_name: judge-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/online_judge
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis
    networks:
      - judge-network

  # React Frontend
  frontend:
    build: ./frontend
    container_name: judge-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - judge-network

volumes:
  postgres_data:


networks:
  judge-network:
    driver: bridge
