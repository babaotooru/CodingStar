# Server Configuration
server.port=8080

# Database Configuration (H2 in-memory for local development)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=false

# SQL Init (seed data - set to 'always' to re-seed, 'never' to skip)
spring.sql.init.mode=never

# JWT Configuration
jwt.secret=dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBqd3QgdG9rZW4gZ2VuZXJhdGlvbiBwdXJwb3NlcyBvbmx5
jwt.expiration-ms=86400000

# Redis Configuration  
#spring.data.redis.host=localhost
#spring.data.redis.port=6379
spring.cache.type=none
#spring.cache.redis.time-to-live=600000

# OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=placeholder-id
spring.security.oauth2.client.registration.google.client-secret=placeholder-secret
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.github.client-id=placeholder-id
spring.security.oauth2.client.registration.github.client-secret=placeholder-secret
spring.security.oauth2.client.registration.github.scope=user:email,read:user

# Code Execution Configuration
code.execution.timeout=10
code.execution.use-docker=false

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.onlinejudge=DEBUG
logging.level.org.springframework.security=INFO
