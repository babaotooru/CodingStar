# Server Configuration
server.port=${PORT:8080}

# Database Configuration
# Defaults to H2 for local development, but can be overridden with SPRING_DATASOURCE_* env vars for Supabase/Postgres.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=false

# SQL Init (load schema.sql locally; use SPRING_SQL_INIT_MODE=never for Supabase/Postgres)
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:always}

# JWT Configuration
jwt.secret=dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBqd3QgdG9rZW4gZ2VuZXJhdGlvbiBwdXJwb3NlcyBvbmx5
jwt.expiration-ms=86400000

# Redis Configuration  
#spring.data.redis.host=localhost
#spring.data.redis.port=6379
spring.cache.type=none
#spring.cache.redis.time-to-live=600000

# OAuth2 Configuration
# Provide these through environment variables or a local .env file.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:render-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:render-google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:render-github-client-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:render-github-client-secret}
spring.security.oauth2.client.registration.github.scope=user:email,read:user

# Code Execution Configuration
code.execution.timeout=10
code.execution.use-docker=false

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.onlinejudge=DEBUG
logging.level.org.springframework.security=INFO
