# Production profile for Render + Supabase/PostgreSQL
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# Database (set these in Render environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA (production)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=false

# Do not run local schema/data SQL scripts in production
spring.sql.init.mode=never

# CORS + frontend URL (set in Render env vars)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://coding-star.vercel.app}
app.frontend-url=${APP_FRONTEND_URL:https://coding-star.vercel.app}

# Security/JWT (set in Render env vars)
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Cache/Redis
spring.cache.type=${SPRING_CACHE_TYPE:none}

# OAuth (set these in Render env vars)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=https://codingstar.onrender.com/login/oauth2/code/google
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:}
spring.security.oauth2.client.registration.github.scope=user:email,read:user
spring.security.oauth2.client.registration.github.redirect-uri=https://codingstar.onrender.com/login/oauth2/code/github

# Code execution (keep false on Render unless isolated runner is configured)
code.execution.timeout=10
code.execution.use-docker=false

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.onlinejudge=INFO
logging.level.org.springframework.security=INFO
