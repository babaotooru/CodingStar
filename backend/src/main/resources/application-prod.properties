# Production profile for Render + Supabase/PostgreSQL
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# Database (set these in Render environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db.kefwjrfqnzhbvopljwau.supabase.co:5432/postgres?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:CodingJudge!@}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000

# JPA (production)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.defer-datasource-initialization=false

# Do not run local schema/data SQL scripts in production
spring.sql.init.mode=never

# CORS + frontend URL (set in Render env vars)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://coding-star.vercel.app}
app.frontend-url=${APP_FRONTEND_URL:https://coding-star.vercel.app}

# Security/JWT (set in Render env vars)
jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBqd3QgdG9rZW4gZ2VuZXJhdGlvbiBwdXJwb3NlcyBvbmx5}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Cache/Redis
spring.cache.type=${SPRING_CACHE_TYPE:none}

# OAuth is disabled in production unless real Render env vars are configured.
# Leaving these registrations out prevents Spring from exposing broken OAuth endpoints.

# Code execution (keep false on Render unless isolated runner is configured)
code.execution.timeout=10
code.execution.use-docker=false

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.onlinejudge=INFO
logging.level.org.springframework.security=INFO
